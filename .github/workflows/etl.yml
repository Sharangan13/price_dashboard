name: Daily ETL

on:
  schedule:
    - cron: '42 10 * * 1-5'   # 4:12 PM Sri Lanka Time (UTC+5:30)
    - cron: '30 14 * * 1-5'   # 8:00 PM Sri Lanka Time (UTC+5:30)
  workflow_dispatch:

jobs:
  run-etl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pdfplumber requests psycopg2-binary

      - name: Run ETL
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
        run: python elt.py